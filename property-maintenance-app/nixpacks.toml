# Railway build configuration
# This tells Railway how to install, build, and start the app

[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x"]

[phases.install]
cmds = [
  "npm ci",
  "cd client && npm install --include=dev"
]

[phases.build]
cmds = [
  "cd client && npm run build"
]

[start]
cmd = "node server/index.js"
